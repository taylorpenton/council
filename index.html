<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Council</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border-mid: rgba(255,255,255,0.14);
    --text: #c8c4bc; --text-dim: #707070; --text-bright: #e8e4dc;
    --radius: 4px; --font: 'DM Mono', 'Courier New', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  .wordmark { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2.5rem; }
  #gate { display: flex; flex-direction: column; gap: 10px; max-width: 320px; margin-top: 4rem; }
  #gate-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
  #gate-input { padding: 9px 12px; font-family: var(--font); font-size: 13px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text-bright); outline: none; }
  #gate-input:focus { border-color: var(--border-mid); }
  #gate-btn { padding: 9px; font-family: var(--font); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; background: transparent; border: 0.5px solid var(--border-mid); color: var(--text); cursor: pointer; border-radius: var(--radius); }
  #gate-btn:hover { background: var(--surface); color: var(--text-bright); }
  #gate-err { font-size: 11px; color: #c0392b; display: none; }
  #app { display: none; }
  .mode-row { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .mode-btn { flex: 1; padding: 7px 0; font-family: var(--font); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; background: transparent; border: 0.5px solid var(--border); color: var(--text-dim); cursor: pointer; border-radius: var(--radius); transition: all 0.15s; }
  .mode-btn.active { border-color: var(--border-mid); color: var(--text-bright); background: var(--surface); }
  .voices-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .vpill { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px 3px 8px; border: 0.5px solid var(--border); border-left-width: 2px; border-radius: 2px; color: var(--text-dim); }
  textarea { width: 100%; min-height: 110px; padding: 12px; font-family: var(--font); font-size: 13px; line-height: 1.6; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text-bright); resize: vertical; outline: none; }
  textarea:focus { border-color: var(--border-mid); }
  textarea::placeholder { color: var(--text-dim); }
  .run-btn { width: 100%; margin-top: 10px; padding: 10px; font-family: var(--font); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; background: transparent; border: 0.5px solid var(--border-mid); color: var(--text); cursor: pointer; border-radius: var(--radius); transition: all 0.15s; }
  .run-btn:hover { background: var(--surface); color: var(--text-bright); }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }
  .key-section { margin-bottom: 2rem; }
  .key-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .key-row { display: flex; gap: 6px; }
  .key-input { flex: 1; padding: 8px 12px; font-family: var(--font); font-size: 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text-bright); outline: none; }
  .key-input:focus { border-color: var(--border-mid); }
  .key-save { padding: 8px 14px; font-family: var(--font); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; background: transparent; border: 0.5px solid var(--border-mid); color: var(--text); cursor: pointer; border-radius: var(--radius); white-space: nowrap; }
  .key-save:hover { background: var(--surface); }
  .key-status { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .key-status.ok { color: #27ae60; }
  .output { margin-top: 2rem; }
  .voice-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 8px; }
  .voice-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .vdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .vname { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
  .vbody { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .vbody.loading { color: var(--text-dim); font-style: italic; }
  .synth-card { background: var(--surface2); border: 0.5px solid var(--border-mid); border-radius: var(--radius); padding: 1rem 1.25rem; margin-top: 1rem; }
  .synth-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
  .synth-body { font-size: 13px; line-height: 1.7; color: var(--text-bright); white-space: pre-wrap; }
  .status-line { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 10px; }
  .err { font-size: 12px; color: #c0392b; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="wordmark">Council — Work by Taylor</div>

  <div id="gate">
    <div id="gate-label">Password</div>
    <input type="password" id="gate-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')unlock()" />
    <button id="gate-btn" onclick="unlock()">Enter</button>
    <div id="gate-err">Incorrect password.</div>
  </div>

  <div id="app">
    <div class="key-section">
      <div class="key-label">Anthropic API Key</div>
      <div class="key-row">
        <input type="password" class="key-input" id="api-key" placeholder="sk-ant-..." />
        <button class="key-save" onclick="saveKey()">Save</button>
      </div>
      <div class="key-status" id="key-status"></div>
    </div>

    <hr class="divider">

    <div class="mode-row">
      <button class="mode-btn active" id="btn-business" onclick="setMode('business')">Business</button>
      <button class="mode-btn" id="btn-system" onclick="setMode('system')">System</button>
    </div>

    <div class="voices-row" id="voices-row"></div>
    <textarea id="decision-input" placeholder="Describe the decision or idea you want the council to evaluate..."></textarea>
    <button class="run-btn" id="run-btn" onclick="runCouncil()">Convene the council</button>
    <div class="output" id="output"></div>
  </div>
</div>

<script>
const SITE_PASSWORD = 'josiebea';

const MODES = {
  business: {
    voices: [
      { name: 'Revenue', dot: '#1D9E75', prompt: 'You are the Revenue voice on a decision council for a one-person font foundry called Work by Taylor (taylorpenton.com). Fonts sell for $25 each. The Big Typeface Collection bundle is the top revenue driver. Pinterest is the primary ad channel at ~$395/day spend. Your mandate: evaluate this decision purely through the lens of money — will it make money, when, how much, what is the realistic impact on sales and AOV? Be direct and specific. Do not be a yes-man. If the numbers do not add up, say so. Find the financial flaw. 3-5 sentences max.' },
      { name: 'Brand', dot: '#7F77DD', prompt: 'You are the Brand voice on a decision council for a one-person font foundry called Work by Taylor (taylorpenton.com). The brand is dry, punchy, anti-corporate, irreverent, and self-aware. Fonts are $25. Your mandate: does this decision fit the foundry positioning and catalog identity? Does it dilute or strengthen the brand? Be blunt — flag anything that feels off. Do not be a yes-man. 3-5 sentences max.' },
      { name: 'Risk', dot: '#D85A30', prompt: 'You are the Risk voice on a decision council for a one-person font foundry called Work by Taylor (taylorpenton.com). Your mandate: find what goes wrong. Poke holes. Identify the downside, the failure mode, the unintended consequence. You are not here to balance — you are here to find what everyone else is ignoring. Do not be a yes-man. Be specific, not vague. 3-5 sentences max.' },
      { name: 'Operator', dot: '#BA7517', prompt: 'You are the Operator voice on a decision council for a one-person font foundry called Work by Taylor. This is a solo operation — Taylor handles all design, strategy, and most technical work. Your mandate: is this actually executable solo? Flag complexity, time cost, dependencies, and anything that sounds good in theory but falls apart for one person. Do not be a yes-man. 3-5 sentences max.' },
      { name: 'Customer', dot: '#378ADD', prompt: 'You are the Customer voice on a decision council for a one-person font foundry called Work by Taylor (taylorpenton.com). Customers are designers, brand owners, and creatives who discover fonts via Pinterest ads and buy on the Shopify storefront. Your mandate: does this land for the buyer? Is the value obvious? Would someone bounce? Would this confuse or delight? Do not be a yes-man. 3-5 sentences max.' }
    ]
  },
  system: {
    voices: [
      { name: 'Clarity', dot: '#7F77DD', prompt: 'You are the Clarity voice on a decision council for a personal AI operating system called ClaudeMemory — a markdown-based OS stored locally at /Users/taylor/ClaudeMemory/ and used with Claude. Your mandate: is this change understandable at a glance? Would Taylor know exactly what it does six months from now without re-reading docs? Flag anything opaque, over-engineered, or hard to explain. Do not be a yes-man. 3-5 sentences max.' },
      { name: 'Durability', dot: '#1D9E75', prompt: 'You are the Durability voice on a decision council for a personal AI operating system called ClaudeMemory. Your mandate: will this hold up without maintenance? Does it break if one thing changes? Is it brittle or resilient? Flag dependencies, single points of failure, and anything that will need constant upkeep. Do not be a yes-man. 3-5 sentences max.' },
      { name: 'Friction', dot: '#D85A30', prompt: 'You are the Friction voice on a decision council for a personal AI operating system called ClaudeMemory used daily by a solo founder. Your mandate: does this change reduce or add friction to the actual day-to-day workflow? A system that is theoretically elegant but adds steps is a bad system. Be specific about where friction is introduced or removed. Do not be a yes-man. 3-5 sentences max.' },
      { name: 'Scope', dot: '#BA7517', prompt: 'You are the Scope voice on a decision council for a personal AI operating system called ClaudeMemory. Your mandate: is this the right size? Is it doing too much or too little? Does it duplicate something that already exists? Does it leave important gaps? Flag over-engineering and under-engineering equally. Do not be a yes-man. 3-5 sentences max.' },
      { name: 'Integration', dot: '#378ADD', prompt: 'You are the Integration voice on a decision council for a personal AI operating system called ClaudeMemory, which includes skills, Notion, Gmail MCP, Shopify MCP, and filesystem tools all interconnected. Your mandate: does this change play well with everything else in the OS? Does it create conflicts, break existing flows, or introduce unexpected dependencies? Do not be a yes-man. Be specific. 3-5 sentences max.' }
    ]
  }
};

let currentMode = 'business';

function unlock() {
  const val = document.getElementById('gate-input').value;
  if (val === SITE_PASSWORD) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('council_unlocked', '1');
    loadSavedKey();
    renderPills();
  } else {
    document.getElementById('gate-err').style.display = 'block';
    document.getElementById('gate-input').value = '';
    document.getElementById('gate-input').focus();
  }
}

function loadSavedKey() {
  const saved = localStorage.getItem('council_api_key');
  if (saved) {
    document.getElementById('api-key').value = saved;
    document.getElementById('key-status').textContent = 'Key loaded from storage';
    document.getElementById('key-status').className = 'key-status ok';
  }
}

function saveKey() {
  const val = document.getElementById('api-key').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('key-status').textContent = 'Key should start with sk-ant-';
    document.getElementById('key-status').className = 'key-status';
    return;
  }
  localStorage.setItem('council_api_key', val);
  document.getElementById('key-status').textContent = 'Key saved';
  document.getElementById('key-status').className = 'key-status ok';
}

function getKey() {
  return localStorage.getItem('council_api_key') || document.getElementById('api-key').value.trim();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-business').className = 'mode-btn' + (mode === 'business' ? ' active' : '');
  document.getElementById('btn-system').className = 'mode-btn' + (mode === 'system' ? ' active' : '');
  renderPills();
  document.getElementById('output').innerHTML = '';
}

function renderPills() {
  document.getElementById('voices-row').innerHTML = MODES[currentMode].voices.map(v =>
    `<span class="vpill" style="border-left-color:${v.dot}">${v.name}</span>`
  ).join('');
}

async function callClaude(apiKey, systemPrompt, userMsg) {
  const res = await fetch('/api/proxy', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key-forward': apiKey
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

async function runCouncil() {
  const apiKey = getKey();
  if (!apiKey) { alert('Paste your Anthropic API key first.'); return; }
  const decision = document.getElementById('decision-input').value.trim();
  if (!decision) return;

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Convening...';

  const voices = MODES[currentMode].voices;
  const output = document.getElementById('output');

  output.innerHTML = `<div class="status-line" id="status-line">Polling ${voices.length} voices in parallel...</div>` +
    voices.map((v, i) => `
      <div class="voice-card">
        <div class="voice-head">
          <div class="vdot" style="background:${v.dot}"></div>
          <div class="vname">${v.name}</div>
        </div>
        <div class="vbody loading" id="vb-${i}">Reasoning independently...</div>
      </div>
    `).join('');

  const userMsg = `Decision / idea to evaluate:\n\n${decision}`;
  let results = [];

  try {
    await Promise.all(voices.map((v, i) =>
      callClaude(apiKey, v.prompt, userMsg).then(text => {
        document.getElementById(`vb-${i}`).textContent = text;
        document.getElementById(`vb-${i}`).className = 'vbody';
        results[i] = { name: v.name, text };
      })
    ));
  } catch (err) {
    output.innerHTML += `<div class="err">Error: ${err.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Convene the council';
    return;
  }

  const statusEl = document.getElementById('status-line');
  if (statusEl) statusEl.textContent = 'Synthesizing...';

  const synthPrompt = `You are the synthesis voice for a decision council advising a solo font foundry owner. You have received independent assessments from ${voices.length} voices. Your job: (1) identify where voices agree, (2) identify where they genuinely split or conflict, (3) give one clear recommendation — not "it depends." State a direction and the single condition that would change it. Be direct. Do not summarize each voice. Find the signal in the disagreement. No hedging. No filler.`;
  const synthInput = `Decision:\n${decision}\n\n---\n\n${results.map(r => `${r.name}:\n${r.text}`).join('\n\n---\n\n')}`;

  try {
    const synthesis = await callClaude(apiKey, synthPrompt, synthInput);
    if (statusEl) statusEl.remove();
    const card = document.createElement('div');
    card.className = 'synth-card';
    card.innerHTML = `<div class="synth-label">Synthesis + recommendation</div><div class="synth-body">${synthesis}</div>`;
    output.appendChild(card);
  } catch (err) {
    output.innerHTML += `<div class="err">Synthesis error: ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Convene the council';
}

window.onload = () => {
  if (sessionStorage.getItem('council_unlocked') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSavedKey();
    renderPills();
  } else {
    document.getElementById('gate-input').focus();
  }
};
</script>
</body>
</html>
